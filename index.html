<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chess Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>♔ Chess Game ♚</h1>

      <div class="turn" id="turn">⚪ White's Turn</div>

      <div class="captured" id="whiteCaptured">White Captured:</div>

      <div class="board-wrapper">
        <div class="top-labels">
          <span>A</span>
          <span>B</span>
          <span>C</span>
          <span>D</span>
          <span>E</span>
          <span>F</span>
          <span>G</span>
          <span>H</span>
        </div>

        <div class="middle">
          <div class="side-labels">
            <span>8</span>
            <span>7</span>
            <span>6</span>
            <span>5</span>
            <span>4</span>
            <span>3</span>
            <span>2</span>
            <span>1</span>
          </div>

          <table id="table"></table>
        </div>
      </div>

      <div class="captured" id="blackCaptured">Black Captured:</div>
    </div>
    <script
      src="https://kit.fontawesome.com/bac9e6aa7c.js"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="js/main.js"></script>
  </body>
</html>
